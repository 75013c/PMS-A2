<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Items</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="search">
  <div class="header">
    <h1>Inventory Management System</h1>
  </div>

  <nav class="navbar">
    <a href="index.html">Item Management</a>
    <a href="search.html" class="active">Search Item</a>
    <a href="inventory.html">Display Inventory</a>
  </nav>

  <div class="container">

    <section class="card">
      <h2>Search Item Information</h2>

      <div id="messageBox" class="message" aria-live="polite"></div>
  
      <div class="field">
        <p class="section-note search-note">Please enter a name to search item information.</p>
        <input type="text" id="searchName" maxlength="60" />
      </div>

      <div class="button-row">
        <button type="button" id="clearSearchBtn" class="clear-btn">Clear</button>
        <button type="button" id="searchBtn" class="add-save-btn">Search</button>
      </div>
    </section>

    <section class="card search-results-card">
      <h2>Search Results</h2>
      <div id="resultsInfo" class="results-info"></div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Item ID</th>
              <th>Item Name</th>
              <th>Category</th>
              <th>Quantity</th>
              <th>Price</th>
              <th>Supplier</th>
              <th>Stock Status</th>
              <th>Popular</th>
              <th>Comment</th>
            </tr>
          </thead>
          <tbody id="inventoryTableBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
